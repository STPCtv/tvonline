<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>MENU STPC TV - Canales en vivo</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="logos/TV.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- HLS.js y dash.js se cargan dinámicamente solo cuando se necesitan -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
        }

        /* OPTIMIZADO: sin background-attachment:fixed para evitar re-renders en Android/TvBro */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("fondo.jpg") no-repeat center center;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.75);
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 i { font-size: 2rem; color: #ff9800; }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e2a3a;
            color: #ffaa33;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-button:hover { background: #2a3a4a; color: #ffcc66; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 5px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .card i { font-size: 34px; color: #ffaa33; }
        .card span { display: block; font-weight: 600; word-break: break-word; }

        /* Logos PNG con fallback a ícono FA */
        .card .logo-img {
            width: 80px;
            height: 50px;
            object-fit: contain;
            border-radius: 6px;
        }
        .card .logo-fallback { display: none; font-size: 34px; color: #ffaa33; }
        .card .logo-fallback.show { display: inline-block; }

        .card:hover { background: #2a2a4e; border-color: #ffaa33; }
        .card:focus-visible { outline: 3px solid #ff9800; outline-offset: 2px; background: #2a2a4e; border-color: #ff9800; }

        .locked { position: relative; }
        .locked::before {
            content: "★";
            position: absolute;
            top: 6px; left: 10px;
            font-size: 12px;
            color: #ffcc00;
            z-index: 1;
        }

        /* ===== MODAL DE OPCIONES ===== */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #modal-overlay.visible { display: flex; }

        #modal-box {
            background: #1a1a2e;
            border: 2px solid #ff9800;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 420px;
            width: 92%;
            text-align: center;
        }

        #modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffaa33;
            margin-bottom: 8px;
        }

        #modal-subtitle {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 22px;
        }

        .modal-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            background: #12122a;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: left;
        }
        .modal-btn i { font-size: 1.6rem; color: #ffaa33; min-width: 30px; }
        .modal-btn:hover { background: #2a2a4e; border-color: #ffaa33; }
        .modal-btn small { display: block; font-size: 0.72rem; color: #aaa; font-weight: 400; margin-top: 2px; }

        .modal-cancel {
            background: none;
            border: none;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 6px;
            padding: 6px 16px;
        }
        .modal-cancel:hover { color: #ccc; }

        /* ===== REPRODUCTOR INLINE ===== */
        #player-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            flex-direction: column;
        }
        #player-overlay.visible { display: flex; }

        #player-topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.7);
            flex-shrink: 0;
        }

        #player-channel-name {
            font-size: 1rem;
            font-weight: 700;
            color: #ffaa33;
            flex: 1;
        }

        #btn-close-player {
            background: #cc3300;
            border: none;
            border-radius: 10px;
            color: white;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #btn-close-player:hover { background: #ff4400; }

        #player-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        #main-video {
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 60px);
            background: #000;
            outline: none;
        }

        #player-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #ffaa33;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: none;
            white-space: nowrap;
        }

        /* ===== MENÚ FLOTANTE FÚTBOL ===== */
        #football-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #13132a;
            border: 2px solid #ff9800;
            border-radius: 20px;
            padding: 20px 18px 16px;
            z-index: 150;
            min-width: 280px;
            max-width: 94vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        }
        #football-panel.visible { display: block; }
        #football-panel-title {
            font-size: 1rem;
            font-weight: 700;
            color: #ffaa33;
            margin-bottom: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .fp-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: #1e1e3a;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            text-align: left;
        }
        .fp-btn i { color: #ffaa33; min-width: 22px; font-size: 1.1rem; }
        .fp-btn:hover { background: #2a2a50; border-color: #ffaa33; }
        .fp-btn:last-of-type { margin-bottom: 0; }
        #football-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 149;
        }
        #football-backdrop.visible { display: block; }
        #fp-cancel {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: #888;
            font-size: 0.82rem;
            cursor: pointer;
            margin-top: 10px;
            padding: 4px;
            text-align: center;
        }
        #fp-cancel:hover { color: #ccc; }

        /* ===== SELECTOR DE FUENTE (opción 1 / opción 2) ===== */
        #source-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #13132a;
            border: 2px solid #ff9800;
            border-radius: 20px;
            padding: 22px 20px 16px;
            z-index: 150;
            min-width: 290px;
            max-width: 94vw;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        }
        #source-panel.visible { display: block; }
        #source-panel-title {
            font-size: 1rem;
            font-weight: 700;
            color: #ffaa33;
            margin-bottom: 4px;
        }
        #source-countdown-bar-wrap {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            height: 5px;
            margin: 10px 0 16px;
            overflow: hidden;
        }
        #source-countdown-bar {
            height: 5px;
            background: #ff9800;
            border-radius: 6px;
            width: 100%;
            transition: width 1s linear;
        }
        #source-countdown-text {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 14px;
            margin-top: -10px;
        }
        .src-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: #1e1e3a;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            text-align: left;
        }
        .src-btn i { color: #ffaa33; min-width: 24px; font-size: 1.2rem; }
        .src-btn small { display: block; font-size: 0.7rem; color: #aaa; font-weight: 400; margin-top: 2px; }
        .src-btn:hover { background: #2a2a50; border-color: #ffaa33; }
        .src-btn.active-countdown { border-color: #ff9800; box-shadow: 0 0 0 2px rgba(255,152,0,0.3); }
        #src-cancel {
            background: none;
            border: none;
            color: #888;
            font-size: 0.82rem;
            cursor: pointer;
            padding: 4px;
            margin-top: 2px;
        }
        #src-cancel:hover { color: #ccc; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 3px; }

        @media (min-width: 1400px) {
            .grid { grid-template-columns: repeat(8, minmax(135px, 1fr)); gap: 14px; }
            .card i { font-size: 38px; }
            .card span { font-size: 14px; }
        }
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .card { padding: 10px 4px; }
            .card i { font-size: 26px; }
            .card span { font-size: 11px; }
            h1 { font-size: 1.4rem; }
            .back-button { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div id="dynamic-header">
            <h1><i class="fas fa-tv"></i> MENU STPC TV <i class="fas fa-satellite-dish"></i></h1>
        </div>
        <div id="back-button-container" style="min-height:52px;"></div>

    <!-- PANEL FLOTANTE FÚTBOL -->

    <!-- PANEL SELECTOR DE FUENTE -->
    <div id="source-panel">
        <div id="source-panel-title"></div>
        <div id="source-countdown-bar-wrap"><div id="source-countdown-bar"></div></div>
        <div id="source-countdown-text">Abriendo Opción 1 en <span id="source-seconds">6</span>s...</div>
        <button class="src-btn active-countdown" id="src-btn-1">
            <i class="fas fa-play-circle"></i>
            <div>Opción 1 <small>Fuente principal</small></div>
        </button>
        <button class="src-btn" id="src-btn-2">
            <i class="fas fa-satellite-dish"></i>
            <div>Opción 2 <small>Fuente alternativa</small></div>
        </button>
        <button id="src-cancel">✕ Cancelar</button>
    </div>

    <!-- MODAL: elegir cómo abrir -->
    <div id="modal-overlay">
        <div id="modal-box">
            <div id="modal-title"></div>
            <div id="modal-subtitle"></div>
            <button class="modal-btn" id="btn-inline">

                <div>
                    Reproducir aquí

                </div>
            </button>
            <button class="modal-btn" id="btn-mxplayer">
                <i class="fas fa-mobile-alt"></i>
                <div>
                    Abrir en MX Player
                    <small>Lanza la app instalada en tu TV Box</small>
                </div>
            </button>
            <button class="modal-btn" id="btn-vlc">
                <i class="fas fa-play-circle"></i>
                <div>
                    Abrir en VLC
                    <small>Alternativa gratuita a MX Player</small>
                </div>
            </button>
            <button class="modal-btn" id="btn-browser">
                <i class="fas fa-globe"></i>
                <div>
                    Abrir en browser
                    <small>Misma pestaña, sin acumular tabs</small>
                </div>
            </button>
            <button class="modal-cancel" id="btn-cancel-modal">✕ Cancelar</button>
        </div>
    </div>

    <!-- REPRODUCTOR INLINE -->
    <div id="player-overlay">
        <div id="player-topbar">

        </div>
        <div id="player-wrap">

            <div id="player-status"></div>
        </div>

        // ===== FÚTBOL =====
        const footballOptions = [
            { name: "⚽ Fútbol Opción 1", url: "https://alangulotv2.pl/",                              icon: "fas fa-futbol" },
            { name: "⚽ Fútbol Opción 2", url: "https://rojadirectaplay.com/",                         icon: "fas fa-futbol" },

            { name: "⚽ Fútbol Opción 7", url: "https://www.fctv33hd.pics/es",                         icon: "fas fa-tv" }
        ];

        // ===== DETECCIÓN DE TIPO DE URL =====
        function detectUrlType(url) {
            if (!url) return "none";
            const u = url.toLowerCase().split("?")[0];
            if (u.endsWith(".m3u8") || u.includes(".m3u8")) return "hls";
            if (u.endsWith(".mpd")  || u.includes(".mpd"))  return "dash";
            if (u.endsWith(".m3u"))                         return "m3u";
            return "web";
        }

        // ===== CARGA DINÁMICA DE LIBRERÍAS (solo cuando se necesitan) =====
        // OPTIMIZADO: evita cargar ~650KB en cada visita si no se reproduce ningún stream
        function loadScript(src, callback) {
            const s = document.createElement('script');
            s.src = src;
            s.onload = callback;
            s.onerror = function() { callback(new Error('Error cargando ' + src)); };
            document.head.appendChild(s);
        }

        let hlsReady  = false;
        let dashReady = false;

        function ensureHls(callback) {
            if (hlsReady || window.Hls) { hlsReady = true; callback(); return; }
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js', function(err) {
                if (!err) hlsReady = true;
                callback(err);
            });
        }

        function ensureDash(callback) {
            if (dashReady || window.dashjs) { dashReady = true; callback(); return; }
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.0/dash.all.min.js', function(err) {
                if (!err) dashReady = true;
                callback(err);
            });
        }

        // ===== INTENT URLS PARA APPS EXTERNAS =====
        function buildMxIntent(url, title) {
            return "intent://" + url.replace(/^https?:\/\//, "") +
                "#Intent;action=android.intent.action.VIEW;" +
                "type=video/mp4;" +
                "package=com.mxtech.videoplayer.pro;" +
                "S.title=" + encodeURIComponent(title || "") + ";" +
                "end";
        }

        function buildVlcIntent(url) {
            return "intent://" + url.replace(/^https?:\/\//, "") +
                "#Intent;action=android.intent.action.VIEW;" +
                "type=video/mp4;" +
                "package=org.videolan.vlc;" +
                "end";
        }

        // ===== ESTADO =====
        let currentMode  = "main";
        let currentUrl   = "";
        let currentName  = "";
        let hlsInstance  = null;
        let dashInstance = null;

        // ===== ELEMENTOS DOM =====
        const gridEl         = document.getElementById("grid");
        const backContainer  = document.getElementById("back-button-container");
        const headerDiv      = document.getElementById("dynamic-header");

        const modalOverlay   = document.getElementById("modal-overlay");
        const modalTitle     = document.getElementById("modal-title");
        const modalSubtitle  = document.getElementById("modal-subtitle");
        const btnInline      = document.getElementById("btn-inline");
        const btnMxPlayer    = document.getElementById("btn-mxplayer");
        const btnVlc         = document.getElementById("btn-vlc");
        const btnBrowser     = document.getElementById("btn-browser");
        const btnCancelModal = document.getElementById("btn-cancel-modal");

        const playerOverlay   = document.getElementById("player-overlay");
        const playerChannelNm = document.getElementById("player-channel-name");
        const mainVideo       = document.getElementById("main-video");
        const playerStatus    = document.getElementById("player-status");
        const btnClosePlayer  = document.getElementById("btn-close-player");

        // ===== MODAL =====
        function showModal(url, name) {
            currentUrl  = url;
            currentName = name;
            const type  = detectUrlType(url);

            modalTitle.textContent    = name;
            modalSubtitle.textContent = type === "hls"  ? "Stream HLS (m3u8)" :
                                        type === "dash" ? "Stream DASH (mpd)" :
                                        type === "m3u"  ? "Lista M3U"         :
                                        "Sitio web externo";

            btnInline.style.display   = (type === "hls" || type === "dash") ? "flex" : "none";
            btnMxPlayer.style.display = (type === "hls" || type === "dash") ? "flex" : "none";
            btnVlc.style.display      = (type === "hls" || type === "dash") ? "flex" : "none";
            btnBrowser.style.display  = "flex";

            modalOverlay.classList.add("visible");
        }

        function hideModal() {
            modalOverlay.classList.remove("visible");
        }

        // ===== REPRODUCTOR INLINE =====
        function destroyPlayers() {
            if (hlsInstance)  { hlsInstance.destroy(); hlsInstance = null; }
            if (dashInstance) { dashInstance.reset();  dashInstance = null; }
            mainVideo.src = "";
            mainVideo.load();
        }

        let statusTimer = null;
        function showStatus(msg) {
            playerStatus.textContent   = msg;
            playerStatus.style.display = "block";
            clearTimeout(statusTimer);
            statusTimer = setTimeout(function() { playerStatus.style.display = "none"; }, 3000);
        }

        // ===== DETECCIÓN DE CAPACIDAD DEL DISPOSITIVO =====
        // Lee señales del hardware disponibles en navegadores Chromium (TvBro incluido).
        // Devuelve "low" (TV Box genérico), "mid" o "high" (ONN, Google TV, etc.)
        // Si el navegador no expone algún dato, asume valores intermedios seguros.
        function detectDeviceProfile() {
            const nucleos = navigator.hardwareConcurrency || 4;  // núcleos de CPU
            const ram     = navigator.deviceMemory       || 2;   // GB de RAM (redondeado)

            // Puntuación simple: cada indicador suma puntos
            let score = 0;
            if (nucleos >= 8)       score += 2;
            else if (nucleos >= 4)  score += 1;

            if (ram >= 4)           score += 2;
            else if (ram >= 2)      score += 1;

            if      (score >= 4) return "high";   // Chromecast, ONN, TV potente
            else if (score >= 2) return "mid";    // TV Box con 2GB RAM y 4 núcleos
            else                 return "low";    // TV Box genérico, 1-2GB, 2 núcleos
        }

        // Configuración de HLS.js según perfil detectado.
        // capLevelToPlayerSize siempre activo: nunca pide más resolución de la que
        // ocupa el elemento de video en pantalla — beneficia a todos los dispositivos.
        function buildHlsConfig(profile) {
            if (profile === "low") {
                return {
                    enableWorker:      false,  // los workers consumen RAM extra
                    lowLatencyMode:    false,
                    maxBufferLength:   10,     // buffer pequeño = menos RAM usada
                    maxMaxBufferLength: 20,
                    capLevelToPlayerSize: true,
                    startLevel:        0,      // arranca en la calidad más baja disponible
                    abrEwmaDefaultEstimate: 500000  // asume ~500 Kbps al inicio
                };
            }
            if (profile === "mid") {
                return {
                    enableWorker:      false,
                    lowLatencyMode:    false,
                    maxBufferLength:   20,
                    maxMaxBufferLength: 40,
                    capLevelToPlayerSize: true,
                    startLevel:        -1,     // HLS elige automáticamente (-1 = auto)
                    abrEwmaDefaultEstimate: 1500000  // asume ~1.5 Mbps al inicio
                };
            }
            // high — sin restricciones, HLS gestiona todo automáticamente
            return {
                enableWorker:      false,
                lowLatencyMode:    true,
                maxBufferLength:   30,
                maxMaxBufferLength: 60,
                capLevelToPlayerSize: true,
                startLevel:        -1,
                abrEwmaDefaultEstimate: 5000000  // asume ~5 Mbps al inicio
            };
        }

        function openInline(url, name) {
            destroyPlayers();
            playerChannelNm.textContent = name;
            playerOverlay.classList.add("visible");

            const type    = detectUrlType(url);
            const profile = detectDeviceProfile();  // "low" | "mid" | "high"

            if (type === "hls") {
                ensureHls(function(err) {
                    if (err) { showStatus("⚠ Error cargando HLS.js"); return; }
                    if (Hls.isSupported()) {
                        const hlsConfig = buildHlsConfig(profile);
                        hlsInstance = new Hls(hlsConfig);
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(mainVideo);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                            mainVideo.play();
                            const label = profile === "low"  ? "🟡 Modo ahorro (dispositivo básico)" :
                                          profile === "mid"  ? "🟢 Modo balanceado" :
                                                              "🔵 Modo HD (dispositivo potente)";
                            showStatus("▶ Reproduciendo — " + label);
                        });
                        hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                            if (data.fatal) showStatus("⚠ Error de stream");
                        });
                    } else if (mainVideo.canPlayType('application/vnd.apple.mpegurl')) {
                        mainVideo.src = url;
                        mainVideo.play();
                    } else {
                        showStatus("⚠ HLS no soportado en este browser");
                    }
                });
            } else if (type === "dash") {
                ensureDash(function(err) {
                    if (err) { showStatus("⚠ Error cargando dash.js"); return; }
                    dashInstance = dashjs.MediaPlayer().create();
                    dashInstance.initialize(mainVideo, url, true);
                    showStatus("▶ Reproduciendo DASH");
                });
            } else {
                mainVideo.src = url;
                mainVideo.play();
            }
        }

        function closePlayer() {
            destroyPlayers();
            playerOverlay.classList.remove("visible");
        }

        // ===== EVENTOS DEL MODAL =====
        btnInline.onclick = function() {
            hideModal();
            openInline(currentUrl, currentName);
        };

        btnMxPlayer.onclick = function() {
            hideModal();
            try { window.location.href = buildMxIntent(currentUrl, currentName); }
            catch(e) { showStatus("MX Player no encontrado"); }
        };

        btnVlc.onclick = function() {
            hideModal();
            try { window.location.href = buildVlcIntent(currentUrl); }
            catch(e) { showStatus("VLC no encontrado"); }
        };

        btnBrowser.onclick = function() {
            hideModal();
            window.location.href = currentUrl;
        };

        btnCancelModal.onclick = hideModal;

        modalOverlay.onclick = function(e) {
            if (e.target === modalOverlay) hideModal();
        };

        btnClosePlayer.onclick = closePlayer;

        // ===== CLICK EN CARD =====
        function handleCardClick(url, name, isTrigger, url2) {
            if (isTrigger) { showFootballPanel(); return; }
            if (!url) return;
            const type = detectUrlType(url);
            // Si tiene url2, mostrar selector de fuente (excepto TV EN VIVO, TV OP.2)
            if (url2) {
                showSourcePanel(url, url2, name, type);
                return;
            }
            if (type === "hls" || type === "dash") {
                showModal(url, name);
            } else {
                window.location.href = url;
            }
        }

        // ===== PANEL FLOTANTE FÚTBOL =====
        const footballBackdrop = document.getElementById("football-backdrop");
        const footballPanel    = document.getElementById("football-panel");

        function showFootballPanel() {
            // Construir botones dinámicamente
            var btns = '';
            footballOptions.forEach(function(opt, i) {
                btns += '<button class="fp-btn" data-idx="' + i + '">' +
                    '<i class="' + opt.icon + '"></i>' +
                    opt.name +
                    '</button>';
            });
            footballPanel.innerHTML = '<div id="football-panel-title"><i class="fas fa-futbol"></i> FÚTBOL — ELEGIR OPCIÓN</div>' +
                btns + '<button id="fp-cancel">✕ Cancelar</button>';
            footballPanel.classList.add("visible");
            footballBackdrop.classList.add("visible");

            Array.from(footballPanel.querySelectorAll('.fp-btn')).forEach(function(btn) {
                btn.onclick = function() {
                    var idx = parseInt(btn.getAttribute('data-idx'));
                    closeFootballPanel();
                    window.location.href = footballOptions[idx].url;
                };
            });
            document.getElementById("fp-cancel").onclick = closeFootballPanel;
            footballBackdrop.onclick = closeFootballPanel;
        }

        function closeFootballPanel() {
            footballPanel.classList.remove("visible");
            footballBackdrop.classList.remove("visible");
        }

        // ===== SELECTOR DE FUENTE CON CUENTA REGRESIVA =====
        var sourcePanel     = document.getElementById("source-panel");
        var sourceBackdrop  = document.getElementById("source-backdrop");
        var srcBtn1         = document.getElementById("src-btn-1");
        var srcBtn2         = document.getElementById("src-btn-2");
        var srcCancel       = document.getElementById("src-cancel");
        var srcCountdownBar = document.getElementById("source-countdown-bar");
        var srcSecondsEl    = document.getElementById("source-seconds");
        var srcPanelTitle   = document.getElementById("source-panel-title");
        var srcTimer        = null;
        var srcSeconds      = 6;
        var srcUrl1Pending  = "";
        var srcUrl2Pending  = "";
        var srcNamePending  = "";
        var srcTypePending  = "";

        function showSourcePanel(url1, url2, name, type) {
            srcUrl1Pending = url1;
            srcUrl2Pending = url2;
            srcNamePending = name;
            srcTypePending = type;
            srcPanelTitle.textContent = name;
            srcSecondsEl.textContent  = "6";
            srcSeconds = 6;
            srcCountdownBar.style.transition = "none";
            srcCountdownBar.style.width = "100%";
            // Forzar reflow antes de activar la transición
            void srcCountdownBar.offsetWidth;
            srcCountdownBar.style.transition = "width 1s linear";
            srcCountdownBar.style.width = (100 * 5 / 6) + "%";

            sourcePanel.classList.add("visible");
            sourceBackdrop.style.display = "block";

            clearInterval(srcTimer);
            srcTimer = setInterval(function() {
                srcSeconds--;
                srcSecondsEl.textContent = srcSeconds;
                srcCountdownBar.style.width = (100 * Math.max(srcSeconds - 1, 0) / 6) + "%";
                if (srcSeconds <= 0) {
                    clearInterval(srcTimer);
                    closeSourcePanel();
                    goToSource(srcUrl1Pending, srcNamePending, srcTypePending);
                }
            }, 1000);
        }

        function closeSourcePanel() {
            clearInterval(srcTimer);
            sourcePanel.classList.remove("visible");
            sourceBackdrop.style.display = "none";
        }

        function goToSource(url, name, type) {
            if (type === "hls" || type === "dash") {
                showModal(url, name);
            } else {
                window.location.href = url;
            }
        }

        srcBtn1.onclick = function() {
            clearInterval(srcTimer);
            closeSourcePanel();
            goToSource(srcUrl1Pending, srcNamePending, srcTypePending);
        };
        srcBtn2.onclick = function() {
            clearInterval(srcTimer);
            closeSourcePanel();
            // Opción 2 es siempre web (pelisjuanita)
            window.location.href = srcUrl2Pending;
        };
        srcCancel.onclick = closeSourcePanel;
        sourceBackdrop.onclick = closeSourcePanel;

        // ===== SUBMENÚ FÚTBOL (mantiene compatibilidad con el grid modo fútbol) =====
        function showFootball() {
            // Redirige al panel flotante en lugar del grid
            showFootballPanel();
        }

        function goToMain() {
            if (currentMode === "main") return;
            currentMode = "main";
            headerDiv.innerHTML = '<h1><i class="fas fa-tv"></i> MENU STPC TV <i class="fas fa-satellite-dish"></i></h1>';
            backContainer.innerHTML = '';
            renderGrid(channels);
        }
        // OPTIMIZADO: loading="lazy" evita cargar logos fuera de pantalla al inicio
        function logoHtml(ch) {
            if (ch.logo) {
                return '<img class="logo-img" loading="lazy" src="logos/' + ch.logo + '" alt="' + ch.name + '" ' +
                    'onerror="this.style.display=\'none\';this.nextElementSibling.classList.add(\'show\')">' +
                    '<i class="logo-fallback ' + (ch.icon || 'fas fa-tv') + '"></i>';
            }
            return '<i class="' + (ch.icon || 'fas fa-tv') + '"></i>';
        }

        // ===== RENDER =====
        function renderGrid(list) {
            const html = list.map(function(ch) {
                return '<div class="card locked" tabindex="0" ' +
                    'data-url="' + (ch.url || '') + '" ' +
                    'data-url2="' + (ch.url2 || '') + '" ' +
                    'data-trigger="' + (ch.isTrigger ? "1" : "0") + '" ' +
                    'data-name="' + ch.name + '">' +
                    logoHtml(ch) +
                    '<span>' + ch.name + '</span>' +
                    '</div>';
            });
            gridEl.innerHTML = html.join('');
            attachCardEvents(gridEl.children);
        }

        function attachCardEvents(cards) {
            Array.from(cards).forEach(function(card) {
                const url     = card.getAttribute('data-url');
                const url2    = card.getAttribute('data-url2') || null;
                const name    = card.getAttribute('data-name');
                const trigger = card.getAttribute('data-trigger') === "1";
                card.onclick = function() { handleCardClick(url, name, trigger, url2); };
                card.onkeydown = function(e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleCardClick(url, name, trigger, url2);
                    }
                };
            });
        }

        // ===== INIT =====
        renderGrid(channels);

        // Recargar si la página viene de caché del navegador (back/forward)
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) window.location.reload();
        });

        if (window.console) console.log("MENU STPC TV v3 — Optimizado para TV Box | Carga diferida HLS+DASH | lazy logos");
    </script>
