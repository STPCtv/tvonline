<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>STPC TV</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="logos/TV.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("fondo.jpg") no-repeat center center;
            background-size: cover;
            opacity: .5;
            z-index: -1;
            pointer-events: none;
        }

        /* ── LOGO / TÍTULO ── */
        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 48px;
        }
        .header-logo i {
            font-size: 2.6rem;
            color: #ff9800;
        }
        .header-logo h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffaa33, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        /* ── GRID DE LAS 3 OPCIONES ── */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 620px;
            padding: 0 20px;
        }

        .menu-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 32px 12px 26px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 152, 0, .35);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: border-color .25s, box-shadow .25s, transform .18s;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }
        .menu-card:hover,
        .menu-card:focus-visible {
            border-color: #ff9800;
            box-shadow: 0 8px 32px rgba(255, 152, 0, .3);
            transform: translateY(-3px);
        }
        .menu-card:active {
            transform: scale(.96);
            opacity: .85;
        }

        .mc-logo {
            width: 80px;
            height: 52px;
            object-fit: contain;
            border-radius: 8px;
        }
        .mc-icon {
            font-size: 2.2rem;
            color: #ffaa33;
        }
        .mc-name {
            font-size: 12px;
            font-weight: 800;
            color: #ffcc66;
            letter-spacing: .5px;
            text-transform: uppercase;
            line-height: 1.3;
        }

        /* ── FÚTBOL OVERLAY ── */
        #football-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }
        #football-overlay.visible { display: flex; }
        #football-box {
            background: #0f0f24;
            border: 1.5px solid rgba(255, 152, 0, .25);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 24px 18px;
        }
        #football-box h2 {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffaa33;
            margin-bottom: 16px;
        }
        .fb-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,.04);
            border: 1.5px solid rgba(255,255,255,.07);
            border-radius: 11px;
            padding: 13px 16px;
            color: #fff;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        .fb-btn i { color: #ffaa33; }
        .fb-btn:hover { background: rgba(255,152,0,.1); border-color: #ff9800; }
        #football-close {
            background: none;
            border: none;
            color: #666;
            font-size: .85rem;
            cursor: pointer;
            display: block;
            margin: 6px auto 0;
            padding: 6px 16px;
        }

        #toast {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,.88);
            color: #ffaa33;
            padding: 9px 22px;
            border-radius: 30px;
            font-size: .83rem;
            font-weight: 600;
            display: none;
            z-index: 9999;
            border: 1px solid rgba(255,152,0,.3);
            white-space: nowrap;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 3px; }

        /* ── RESPONSIVE MÓVIL ── */
        @media (max-width: 480px) {
            .header-logo h1 { font-size: 1.7rem; }
            .header-logo i  { font-size: 1.9rem; }
            .header-logo    { margin-bottom: 32px; }
            .menu-grid      { gap: 12px; padding: 0 14px; }
            .menu-card      { padding: 24px 8px 20px; border-radius: 16px; }
            .mc-logo        { width: 64px; height: 42px; }
            .mc-icon        { font-size: 1.8rem; }
            .mc-name        { font-size: 10px; }
        }

        /* ── TV / PANTALLA GRANDE ── */
        @media (min-width: 900px) {
            .menu-grid      { max-width: 740px; gap: 28px; }
            .menu-card      { padding: 40px 16px 32px; border-radius: 24px; }
            .mc-logo        { width: 100px; height: 66px; }
            .mc-icon        { font-size: 2.6rem; }
            .mc-name        { font-size: 14px; }
            .header-logo h1 { font-size: 2.8rem; }
            .header-logo i  { font-size: 3rem; }
            .header-logo    { margin-bottom: 56px; }
        }
    </style>
</head>
<body>

    <!-- LOGO -->
    <div class="header-logo">
        <i class="fas fa-satellite-dish"></i>
        <h1>STPC TV</h1>
    </div>

    <!-- MENÚ PRINCIPAL — 3 OPCIONES -->
    <div class="menu-grid">

        <div class="menu-card" id="btn-tv-vivo" tabindex="0" role="button" aria-label="TV en vivo">
            <img class="mc-logo" src="logos/TV.png" alt="TV EN VIVO"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
            <i class="fas fa-play-circle mc-icon" style="display:none;"></i>
            <span class="mc-name">TV EN VIVO</span>
        </div>

        <div class="menu-card" id="btn-futbol" tabindex="0" role="button" aria-label="Fútbol">
            <img class="mc-logo" src="logos/futbol.png" alt="FÚTBOL"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
            <i class="fas fa-futbol mc-icon" style="display:none;"></i>
            <span class="mc-name">FÚTBOL</span>
        </div>

        <div class="menu-card" id="btn-tv-op2" tabindex="0" role="button" aria-label="TV Opción 2">
            <img class="mc-logo" src="logos/TV2.png" alt="TV OP.2"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
            <i class="fas fa-search mc-icon" style="display:none;"></i>
            <span class="mc-name">TV OP.2</span>
        </div>

    </div>

    <!-- FÚTBOL OVERLAY -->
    <div id="football-overlay">
        <div id="football-box">
            <h2><i class="fas fa-futbol"></i>&nbsp; FÚTBOL — Elegí una opción</h2>
            <div id="football-list"></div>
            <button id="football-close">✕ Cerrar</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
    const FOOTBALL = [
        {"nombre": "⚽ Fútbol Opción 1", "url": "https://alangulotv2.pl/"},
        {"nombre": "⚽ Fútbol Opción 2", "url": "https://rojadirectaplay.com/"},
        {"nombre": "⚽ Fútbol Opción 3", "url": "https://futbol-libre.su/"},
        {"nombre": "⚽ Fútbol Opción 4", "url": "https://pelotalibretv.su/"},
        {"nombre": "⚽ Fútbol Opción 5", "url": "https://pirlotv3.pl/index2.php"},
        {"nombre": "⚽ Fútbol Opción 6", "url": "https://www.pelisjuanita.com/tv/agenda-deportiva"},
        {"nombre": "⚽ Fútbol Opción 7", "url": "https://www.fctv33hd.pics/es"}
    ];

    const fbOvl    = document.getElementById("football-overlay");
    const fbList   = document.getElementById("football-list");
    const toast    = document.getElementById("toast");
    let toastTimer = null;

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = "block";
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function(){ toast.style.display = "none"; }, 2800);
    }

    /* ── TV EN VIVO ── */
    document.getElementById("btn-tv-vivo").onclick = function() {
        location.href = "https://pelisjuanita.com/tv/";
    };

    /* ── TV OP.2 ── */
    document.getElementById("btn-tv-op2").onclick = function() {
        location.href = "https://www.cxtvenvivo.com/busqueda/?query=argentina";
    };

    /* ── FÚTBOL ── */
    document.getElementById("btn-futbol").onclick = function() {
        var html = "";
        for (var i = 0; i < FOOTBALL.length; i++) {
            html += "<button class=\"fb-btn\" data-url=\"" + FOOTBALL[i].url + "\">"
                  + "<i class=\"fas fa-futbol\"></i> " + FOOTBALL[i].nombre
                  + "</button>";
        }
        fbList.innerHTML = html;
        fbList.querySelectorAll(".fb-btn").forEach(function(btn) {
            btn.onclick = function() { location.href = btn.getAttribute("data-url"); };
        });
        fbOvl.classList.add("visible");
    };

    /* ── Cerrar fútbol ── */
    document.getElementById("football-close").onclick = function() {
        fbOvl.classList.remove("visible");
    };
    fbOvl.onclick = function(e) {
        if (e.target === fbOvl) fbOvl.classList.remove("visible");
    };

    /* ── Teclado / mando TV (Enter o Space activa el botón seleccionado) ── */
    document.querySelectorAll(".menu-card").forEach(function(card) {
        card.addEventListener("keydown", function(e) {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                card.click();
            }
        });
    });

    window.addEventListener("pageshow", function(e) {
        if (e.persisted) window.location.reload();
    });
    </script>
</body>
</html>
