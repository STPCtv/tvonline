    <style>
        /* RESET EXTREMADAMENTE LIGERO - SIN ANIMACIONES, SIN TRANSICIONES, SIN FILTROS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
        }
        
        /* Fijo sin repaints pesados */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }
        
        .overlay {
            background: rgba(0, 0, 0, 0.75);
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
        }
        
        /* Título simple sin efectos */
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        h1 i {
            font-size: 2rem;
            color: #ff9800;
        }
        
        /* Botón volver - sin transiciones pesadas */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e2a3a;
            color: #ffaa33;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .back-button:hover {
            background: #2a3a4a;
            color: #ffcc66;
        }
        
        /* Grid sin transformaciones */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 5px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Tarjetas - ABSOLUTAMENTE SIN TRANSICIONES NI ANIMACIONES */
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .card i {
            font-size: 34px;
            color: #ffaa33;
        }
        
        .card span {
            display: block;
            font-weight: 600;
            word-break: break-word;
        }
        
        /* Hover simple - solo cambio de color sólido */
        .card:hover {
            background: #2a2a4e;
            border-color: #ffaa33;
        }
        
        .card:focus-visible {
            outline: 3px solid #ff9800;
            outline-offset: 2px;
            background: #2a2a4e;
            border-color: #ff9800;
        }
        
        .locked {
            position: relative;
        }
        
        .locked::before {
            content: "★";
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 12px;
            color: #ffcc00;
            z-index: 1;
        }
        
        /* Scroll básico */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff9800;
            border-radius: 3px;
        }
        
        @media (min-width: 1400px) {
            .grid {
                grid-template-columns: repeat(8, minmax(135px, 1fr));
                gap: 14px;
            }
            .card i {
                font-size: 38px;
            }
            .card span {
                font-size: 14px;
            }
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }
            .card {
                padding: 10px 4px;
            }
            .card i {
                font-size: 26px;
            }
            .card span {
                font-size: 11px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .back-button {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>

        // Función para asignar icono por defecto (rápida)
        function getDefaultIcon(name) {
            var n = name.toUpperCase();
            if (n.includes("FUTBOL") || n.includes("SPORT") || n.includes("ESPN") || n.includes("DEPORT")) return "fas fa-futbol";
            if (n.includes("PELI") || n.includes("CINE")) return "fas fa-film";
            if (n.includes("NOTICIA") || n.includes("TN") || n.includes("CRONICA") || n.includes("A24") || n.includes("C5N")) return "fas fa-newspaper";
            if (n.includes("NICK") || n.includes("DISNEY") || n.includes("CARTOON")) return "fas fa-child";
            if (n.includes("MUSIC") || n.includes("MTV")) return "fas fa-music";
            if (n.includes("HISTORY")) return "fas fa-landmark";
            if (n.includes("GOURMET")) return "fas fa-utensils";
            if (n.includes("ANIMAL")) return "fas fa-paw";
            return "fas fa-tv";
        }
        
        // Asignar iconos faltantes en canales principales
        for (var i = 0; i < channels.length; i++) {
            if (!channels[i].icon || channels[i].icon === "") {
                channels[i].icon = getDefaultIcon(channels[i].name);
            }
        }
        
        // Elementos DOM
        var gridEl = document.getElementById("grid");
        var backContainer = document.getElementById("back-button-container");
        var headerDiv = document.getElementById("dynamic-header");
        
        // Estado: "main" o "football"
        var currentMode = "main";
        
        // Variable para almacenar el botón volver (reutilizable)
        var backButton = null;
        
        // ========== RENDER PRINCIPAL (SIN DELEGACIÓN, EVENTOS DIRECTOS) ==========
        function renderMain() {
            var html = [];
            for (var i = 0; i < channels.length; i++) {
                var ch = channels[i];
                var isTriggerAttr = ch.isTrigger ? 'data-trigger="1"' : '';
                html.push('<div class="card locked" data-url="' + (ch.url || '') + '" ' + isTriggerAttr + ' data-name="' + ch.name + '">');
                html.push('<i class="' + ch.icon + '"></i>');
                html.push('<span>' + ch.name + '</span>');
                html.push('</div>');
            }
            gridEl.innerHTML = html.join('');
            
            // Asignar eventos DIRECTOS (más rápido que delegación en TVs lentos)
            var cards = gridEl.children;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var isTrigger = card.getAttribute('data-trigger') === '1';
                var url = card.getAttribute('data-url');
                
                if (isTrigger) {
                    card.onclick = function(e) {
                        e.preventDefault();
                        showFootball();
                    };
                    card.onkeypress = function(e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            showFootball();
                        }
                    };
                } else {
                    if (url && url !== "") {
                        card.onclick = (function(u) { return function() { window.open(u, "_blank"); }; })(url);
                        card.onkeypress = (function(u) { return function(e) {
                            if (e.key === "Enter" || e.key === " ") {
                                e.preventDefault();
                                window.open(u, "_blank");
                            }
                        }; })(url);
                    }
                }
            }
        }
        
        // ========== RENDER SUBMENÚ FÚTBOL ==========
        function renderFootball() {
            var html = [];
            for (var i = 0; i < footballOptions.length; i++) {
                var opt = footballOptions[i];
                html.push('<div class="card locked" data-url="' + opt.url + '">');
                html.push('<i class="' + opt.icon + '"></i>');
                html.push('<span>' + opt.name + '</span>');
                html.push('</div>');
            }
            gridEl.innerHTML = html.join('');
            
            // Asignar eventos a cada opción de fútbol
            var cards = gridEl.children;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var url = card.getAttribute('data-url');
                if (url) {
                    card.onclick = (function(u) { return function() { window.open(u, "_blank"); }; })(url);
                    card.onkeypress = (function(u) { return function(e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            window.open(u, "_blank");
                        }
                    }; })(url);
                }
            }
        }
        
        // ========== MOSTRAR SUBMENÚ FÚTBOL ==========
        function showFootball() {
            if (currentMode === "football") return;
            currentMode = "football";
            
            // Cambiar título
            headerDiv.innerHTML = '<h1><i class="fas fa-futbol"></i> MENU FUTBOL - OPCIONES <i class="fas fa-tv"></i></h1>';
            
            // Crear botón volver si no existe
            backContainer.innerHTML = '<button class="back-button" id="btn-back-main"><i class="fas fa-arrow-left"></i> Volver al menú principal</button>';
            var btn = document.getElementById("btn-back-main");
            if (btn) {
                btn.onclick = function() { goToMain(); };
            }
            
            renderFootball();
        }
        
        // ========== VOLVER AL MENÚ PRINCIPAL ==========
        function goToMain() {
            if (currentMode === "main") return;
            currentMode = "main";
            
            // Restaurar título original
            headerDiv.innerHTML = '<h1><i class="fas fa-tv"></i> MENU STPC TV <i class="fas fa-satellite-dish"></i></h1>';
            
            // Limpiar contenedor del botón volver
            backContainer.innerHTML = '';
            
            renderMain();
        }
        
        // ========== INICIALIZAR ==========
        function init() {
            renderMain();
            currentMode = "main";
            backContainer.innerHTML = '';
        }
        
        init();
        
        // Pequeño log para consola (no afecta rendimiento en TV)
        if (window.console) console.log("MENU STPC TV + Submenú Fútbol - Modo ultra rápido para TV");
    </script>
