    <style>
        /* RESET EXTREMADAMENTE LIGERO - SIN ANIMACIONES NI EFECTOS PESADOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
        }
        
        /* Fondo con imagen optimizada (sin repaints) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }
        
        /* Overlay simple sin blur */
        .overlay {
            background: rgba(0, 0, 0, 0.75);
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
        }
        
        /* Título simple */
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        h1 i {
            font-size: 2rem;
            color: #ff9800;
        }
        
        /* Grid optimizado para TV - sin transformaciones innecesarias */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 5px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Tarjetas - SIN TRANSICIONES, SIN ANIMACIONES, SIN BACKDROP-FILTER */
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: none;
        }
        
        /* Iconos simples */
        .card i {
            font-size: 34px;
            color: #ffaa33;
        }
        
        .card span {
            display: block;
            font-weight: 600;
            word-break: break-word;
        }
        
        /* Hover más simple posible - solo cambio de color */
        .card:hover {
            background: #2a2a4e;
            border-color: #ffaa33;
        }
        
        /* Focus para control remoto */
        .card:focus-visible {
            outline: 3px solid #ff9800;
            outline-offset: 2px;
            background: #2a2a4e;
            border-color: #ff9800;
        }
        
        /* Estrella fija para todos los canales */
        .locked {
            position: relative;
        }
        
        .locked::before {
            content: "★";
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 12px;
            color: #ffcc00;
            z-index: 1;
        }
        
        /* Scroll simple */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff9800;
            border-radius: 3px;
        }
        
        /* Responsive TV grande */
        @media (min-width: 1400px) {
            .grid {
                grid-template-columns: repeat(8, minmax(135px, 1fr));
                gap: 14px;
            }
            .card i {
                font-size: 38px;
            }
            .card span {
                font-size: 14px;
            }
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }
            .card {
                padding: 10px 4px;
            }
            .card i {
                font-size: 26px;
            }
            .card span {
                font-size: 11px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

        // Función simple para obtener icono por defecto si falta
        function getDefaultIcon(name) {
            const n = name.toUpperCase();
            if (n.includes("FUTBOL") || n.includes("SPORT") || n.includes("ESPN") || n.includes("DEPORT")) return "fas fa-futbol";
            if (n.includes("PELI") || n.includes("CINE")) return "fas fa-film";
            if (n.includes("NOTICIA") || n.includes("TN") || n.includes("CRONICA") || n.includes("A24") || n.includes("C5N")) return "fas fa-newspaper";
            if (n.includes("NICK") || n.includes("DISNEY") || n.includes("CARTOON")) return "fas fa-child";
            if (n.includes("MUSIC") || n.includes("MTV")) return "fas fa-music";
            if (n.includes("HISTORY")) return "fas fa-landmark";
            if (n.includes("GOURMET")) return "fas fa-utensils";
            if (n.includes("ANIMAL")) return "fas fa-paw";
            return "fas fa-tv";
        }
        
        // Preparar canales con iconos
        for (let i = 0; i < channels.length; i++) {
            if (!channels[i].icon || channels[i].icon === "") {
                channels[i].icon = getDefaultIcon(channels[i].name);
            }
        }
        
        const grid = document.getElementById("grid");
        
        // Renderizado ultra rápido - sin closures innecesarias
        function render() {
            let html = '';
            for (let i = 0; i < channels.length; i++) {
                const ch = channels[i];
                const iconClass = ch.icon;
                html += `
                    <div class="card locked" data-url="${ch.url}" tabindex="0">
                        <i class="${iconClass}"></i>
                        <span>${ch.name}</span>
                    </div>
                `;
            }
            grid.innerHTML = html;
            
            // Asignar eventos de forma eficiente (delegación)
            const cards = document.querySelectorAll('.card');
            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                const url = card.dataset.url;
                card.onclick = function() { window.open(url, "_blank"); };
                card.onkeypress = function(e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        window.open(url, "_blank");
                    }
                };
            }
        }
        
        render();
        console.log("✅ MENU STPC TV optimizado - " + channels.length + " canales cargados");
