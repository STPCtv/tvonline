    <!-- Meta tags anti-caché (fundamental en TV) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 (Free Icons) - CDN rápido y liviano -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ========== RESET ULTRALIGERO ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: #0a0a0a url("fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Overlay oscuro suave */
        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
        }
        
        /* Título con estilo TV */
        h1 {
            text-align: center;
            font-size: 1.9rem;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        h1 i {
            font-size: 2rem;
            color: #ff9800;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        /* Grid optimizado para TV (similar a la foto: muchas tarjetas con íconos) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            padding: 5px;
            max-width: 1600px;
            margin: 0 auto;
            transform: translateZ(0);
        }
        
        /* Tarjetas modernas con iconos y sombra ligera */
        .card {
            background: linear-gradient(145deg, rgba(28, 28, 40, 0.95), rgba(18, 18, 28, 0.95));
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.15s ease;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        /* Estilo para el ícono dentro de la tarjeta */
        .card i {
            font-size: 32px;
            color: #ffaa33;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        /* Texto del canal */
        .card span {
            display: block;
            font-weight: 600;
            letter-spacing: 0.5px;
            word-break: break-word;
        }
        
        /* Efecto hover/focus para TV (sin scale pesado) */
        .card:hover, .card:focus {
            background: linear-gradient(145deg, rgba(55, 55, 85, 0.98), rgba(40, 40, 65, 0.98));
            border: 2px solid #00e5ff;
            transform: translateY(-2px);
            outline: none;
        }
        
        .card:hover i, .card:focus i {
            transform: scale(1.05);
            color: #ffdd55;
        }
        
        /* Foco para navegación con mando */
        .card:focus-visible {
            outline: 3px solid #ff9800;
            outline-offset: 3px;
            border-color: #ff9800;
        }
        
        /* Indicador de canal fijo con estrella (como el original) pero mejorado */
        .locked {
            position: relative;
            border-left: 4px solid #ff5555;
        }
        
        .locked::before {
            content: "★";
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 14px;
            color: #ffcc00;
            text-shadow: 0 0 2px black;
            z-index: 2;
        }
        
        /* Scroll personalizado */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff9800;
            border-radius: 10px;
        }
        
        /* Responsive para TV grande (pantallas anchas) */
        @media (min-width: 1400px) {
            .grid {
                grid-template-columns: repeat(8, minmax(140px, 1fr));
                gap: 18px;
            }
            .card {
                padding: 18px 6px;
            }
            .card i {
                font-size: 38px;
            }
            .card span {
                font-size: 15px;
            }
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .card {
                padding: 12px 5px;
            }
            .card i {
                font-size: 28px;
            }
            .card span {
                font-size: 11px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
        
        /* Efecto sutil de carga */
        .hidden {
            display: none;
        }
        
        /* pequeña animación de entrada para las cards */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.2s ease forwards;
        }
    </style>
</head>

            { name: "MTV", url: "https://dots.bestleague.world/cvatt.html?get=TVRWX0hE&lang=1", icon: "fas fa-music" }
        ];
        
        // Función para asignar ícono de respaldo o mejorado según el nombre (por si algún canal no tiene ícono definido)
        function getIconForChannel(channelName, defaultIcon) {
            if (defaultIcon && defaultIcon !== "") return defaultIcon;
            
            const nameUpper = channelName.toUpperCase();
            if (nameUpper.includes("FUTBOL") || nameUpper.includes("SPORT") || nameUpper.includes("ESPN") || nameUpper.includes("DEPORT")) return "fas fa-futbol";
            if (nameUpper.includes("PELI") || nameUpper.includes("CINE") || nameUpper.includes("MOVIE")) return "fas fa-film";
            if (nameUpper.includes("NOTICIA") || nameUpper.includes("TN") || nameUpper.includes("CRONICA") || nameUpper.includes("A24") || nameUpper.includes("C5N")) return "fas fa-newspaper";
            if (nameUpper.includes("INFANTIL") || nameUpper.includes("NICK") || nameUpper.includes("DISNEY") || nameUpper.includes("CARTOON")) return "fas fa-child";
            if (nameUpper.includes("MUSIC") || nameUpper.includes("MTV")) return "fas fa-music";
            if (nameUpper.includes("HISTORY")) return "fas fa-landmark";
            if (nameUpper.includes("GOURMET") || nameUpper.includes("COCINA")) return "fas fa-utensils";
            if (nameUpper.includes("ANIMAL")) return "fas fa-paw";
            if (nameUpper.includes("NACIONAL") || nameUpper.includes("PUBLICA")) return "fas fa-university";
            return "fas fa-tv"; // ícono por defecto
        }
        
        // Consolidamos los canales con íconos personalizados dinámicamente pero respetando los definidos
        const finalChannels = channels.map(ch => {
            let finalIcon = ch.icon || "";
            if (!finalIcon || finalIcon === "") {
                finalIcon = getIconForChannel(ch.name, "");
            }
            return { ...ch, icon: finalIcon };
        });
        
        const grid = document.getElementById("grid");
        
        // ========== RENDERIZADO RÁPIDO CON ICONOS Y ESTILO TIPO FOTO ==========
        function renderChannelsWithIcons() {
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < finalChannels.length; i++) {
                const channel = finalChannels[i];
                const card = document.createElement("div");
                card.className = "card locked";   // "locked" muestra la estrella como en el diseño previo (todos fijos)
                
                // Crear elemento icono
                const iconElem = document.createElement("i");
                // Los íconos vienen con clases tipo "fas fa-tv", hay que separar si es fab o fas
                let iconClasses = channel.icon;
                if (!iconClasses.includes("fa-")) {
                    iconClasses = "fas fa-tv";
                }
                iconElem.className = iconClasses;
                
                // Crear span con el nombre
                const nameSpan = document.createElement("span");
                nameSpan.textContent = channel.name;
                
                card.appendChild(iconElem);
                card.appendChild(nameSpan);
                
                // Guardamos URL en dataset
                card.dataset.url = channel.url;
                
                // Evento click directo (óptimo)
                card.onclick = (function(url) {
                    return function() { 
                        window.open(url, "_blank"); 
                    };
                })(channel.url);
                
                // Accesibilidad teclado (Enter / Space)
                card.setAttribute("tabindex", "0");
                card.onkeypress = (function(url) {
                    return function(e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            window.open(url, "_blank");
                        }
                    };
                })(channel.url);
                
                fragment.appendChild(card);
            }
            
            grid.innerHTML = "";
            grid.appendChild(fragment);
        }
        
        // Ejecutar el render principal
        renderChannelsWithIcons();
        
        // Timeout de seguridad por si falla algo (recarga parcial)
        setTimeout(() => {
            if (document.visibilityState === "visible" && grid.children.length === 0) {
                renderChannelsWithIcons();
            }
        }, 500);
        
        // Pequeño log para verificar carga correcta (útil para debugging)
        console.log("✅ MENU STPC TV con íconos cargado - Canales: " + finalChannels.length);
    </script>
