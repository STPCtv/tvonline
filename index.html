<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("fondo.jpg") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(20,20,20,0.85);
    border-radius: 20px;
    padding: 18px 6px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.card:focus, .card:hover {
    transform: scale(1.1);
    outline: 3px solid #00e5ff;
}

.add-btn {
    background: rgba(0,150,0,0.7);
}

.locked {
    border: 2px solid red;
}

/* BOTONES */
.controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

.controls button {
    margin-right: 10px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
}

/* modo edición */
.editing .card {
    outline: 2px dashed orange;
}

/* Editor */
#editor {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.editor-box {
    background:#222;
    padding:20px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

.editor-box input {
    width: 100%;
    margin:10px 0;
    padding:10px;
}
</style>
</head>

let userLinks = JSON.parse(localStorage.getItem("links")) || [];
const grid = document.getElementById("grid");

let editMode = false;
let deleteModeActive = false;
let editIndex = null;

function render() {
    grid.innerHTML = "";

    fixedLinks.forEach(link => {
        const div = document.createElement("div");
        div.className = "card locked";
        div.innerText = link.name;
        div.onclick = () => {
            if (editMode || deleteModeActive) return;
            window.open(link.url, "_blank");
        };
        grid.appendChild(div);
    });

    userLinks.forEach((link, i) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = link.name;

        div.onclick = () => {
            if (editMode) editLink(i);
            else if (deleteModeActive) deleteLink(i);
            else window.open(link.url, "_blank");
        };

        grid.appendChild(div);
    });

    const add = document.createElement("div");
    add.className = "card add-btn";
    add.innerText = "+ Agregar";
    add.style.opacity = editMode ? "1" : "0.4";

    add.onclick = () => {
        if (!editMode) return;
        addLink();
    };

    grid.appendChild(add);
}

function toggleEditMode() {
    editMode = !editMode;
    deleteModeActive = false;
    document.body.classList.toggle("editing", editMode);
    render();
}

function deleteMode() {
    deleteModeActive = !deleteModeActive;
    editMode = false;
    document.body.classList.toggle("editing", deleteModeActive);
    render();
}

function addLink() {
    editIndex = null;
    nameInput.value = "";
    urlInput.value = "";
    openEditor();
}

function editLink(i) {
    editIndex = i;
    nameInput.value = userLinks[i].name;
    urlInput.value = userLinks[i].url;
    openEditor();
}

function deleteLink(i) {
    if (!confirm("¿Eliminar acceso?")) return;
    userLinks.splice(i, 1);
    save();
}

function openEditor() {
    editor.style.display = "flex";
}

function closeEditor() {
    editor.style.display = "none";
}

function saveEditor() {
    const name = nameInput.value.trim();
    const url = urlInput.value.trim();
    if (!name || !url) return;

    if (editIndex === null) userLinks.push({ name, url });
    else userLinks[editIndex] = { name, url };

    save();
    closeEditor();
}

function save() {
    localStorage.setItem("links", JSON.stringify(userLinks));
    render();
}

render();
