    <!-- Meta tags anti-caché (fundamental en TV) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        /* ========== RESET ULTRALIGERO ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: #0a0a0a url("fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Overlay simple sin blur */
        .overlay {
            background: rgba(0, 0, 0, 0.65);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 30px;
        }
        
        /* Título simple */
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        /* Grid rápido */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            padding: 5px;
            max-width: 1400px;
            margin: 0 auto;
            transform: translateZ(0);
        }
        
        /* Tarjetas optimizadas */
        .card {
            background: rgba(25, 25, 35, 0.92);
            border-radius: 16px;
            padding: 16px 6px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: background 0.1s ease;
        }
        
        .card:hover, .card:focus {
            background: rgba(55, 55, 75, 0.96);
            border: 2px solid #00e5ff;
            outline: none;
        }
        
        .card:focus-visible {
            outline: 3px solid #ff9800;
            outline-offset: 2px;
            border-color: #ff9800;
        }
        
        /* Canales fijos */
        .locked {
            border-left: 4px solid #ff5555;
        }
        
        .locked::before {
            content: "★";
            position: absolute;
            margin-left: -22px;
            font-size: 11px;
            color: #ffcc00;
        }
        
        /* Scroll */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff9800;
            border-radius: 3px;
        }
        
        /* Responsive */
        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(8, minmax(130px, 1fr));
                gap: 16px;
            }
            .card {
                padding: 18px 5px;
                font-size: 15px;
            }
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }
            .card {
                padding: 12px 4px;
                font-size: 12px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

        const grid = document.getElementById("grid");
        
        // ========== RENDERIZADO CON MÉTODO ESPECIAL PARA TELEFE ==========
        // Telefe usa sameTab=true para abrir en la misma pestaña (evita about:blank en TV Bro)
        // El resto de canales abren en pestaña nueva como siempre
        function renderChannels() {
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < channels.length; i++) {
                const channel = channels[i];
                const card = document.createElement("div");
                card.className = "card locked";
                card.textContent = channel.name;
                card.dataset.url = channel.url;
                
                // Comportamiento diferente según si es TELEFE (sameTab) o no
                if (channel.sameTab === true) {
                    // TELEFE: abre en la MISMA pestaña (evita el bloqueo de TV Bro)
                    card.onclick = (function(url) {
                        return function() { 
                            window.location.href = url;
                        };
                    })(channel.url);
                    
                    // Soporte teclado para TELEFE
                    card.onkeypress = (function(url) {
                        return function(e) {
                            if (e.key === "Enter" || e.key === " ") {
                                e.preventDefault();
                                window.location.href = url;
                            }
                        };
                    })(channel.url);
                } else {
                    // Resto de canales: abre en pestaña NUEVA (comportamiento original)
                    card.onclick = (function(url) {
                        return function() { 
                            window.open(url, "_blank");
                        };
                    })(channel.url);
                    
                    // Soporte teclado para el resto
                    card.onkeypress = (function(url) {
                        return function(e) {
                            if (e.key === "Enter" || e.key === " ") {
                                e.preventDefault();
                                window.open(url, "_blank");
                            }
                        };
                    })(channel.url);
                }
                
                card.setAttribute("tabindex", "0");
                fragment.appendChild(card);
            }
            
            grid.innerHTML = "";
            grid.appendChild(fragment);
        }
        
        // Ejecutar render
        renderChannels();
        
        // Timeout de seguridad por si algo falla
        setTimeout(() => {
            if (document.visibilityState === "visible" && grid.children.length === 0) {
                renderChannels();
            }
        }, 500);
