        body {

        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("fondo.jpg") no-repeat center center fixed;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.75);
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 i { font-size: 2rem; color: #ff9800; }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e2a3a;
            color: #ffaa33;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-button:hover { background: #2a3a4a; color: #ffcc66; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 5px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .card i { font-size: 34px; color: #ffaa33; }
        .card span { display: block; font-weight: 600; word-break: break-word; }
        .card:hover { background: #2a2a4e; border-color: #ffaa33; }
        .card:focus-visible { outline: 3px solid #ff9800; outline-offset: 2px; background: #2a2a4e; border-color: #ff9800; }

        .locked { position: relative; }
        .locked::before {
            content: "★";
            position: absolute;
            top: 6px; left: 10px;
            font-size: 12px;
            color: #ffcc00;
            z-index: 1;

        /* ===== MODAL DE OPCIONES ===== */
        #modal-overlay {
            display: none;
            position: fixed;

            align-items: center;

        #modal-box {
            background: #1a1a2e;

        // ===== DETECCIÓN DE TIPO DE URL =====
        function detectUrlType(url) {
            if (!url) return "none";
            var u = url.toLowerCase().split("?")[0];
            if (u.endsWith(".m3u8") || u.includes(".m3u8"))  return "hls";
            if (u.endsWith(".mpd")  || u.includes(".mpd"))   return "dash";
            if (u.endsWith(".m3u"))                          return "m3u";
            return "web";
        }

        // ===== INTENT URLS PARA APPS EXTERNAS =====
        function buildMxIntent(url, title) {
            // MX Player Pro y free tienen distintos packages, intentamos ambos
            return "intent://" + url.replace(/^https?:\/\//, "") +
                "#Intent;action=android.intent.action.VIEW;" +
                "type=video/mp4;" +
                "package=com.mxtech.videoplayer.pro;" +
                "S.title=" + encodeURIComponent(title || "") + ";" +
                "end";
        }

        function buildVlcIntent(url) {
            return "intent://" + url.replace(/^https?:\/\//, "") +
                "#Intent;action=android.intent.action.VIEW;" +
                "type=video/mp4;" +
                "package=org.videolan.vlc;" +
                "end";
        }

        var btnCancelModal  = document.getElementById("btn-cancel-modal");

        var playerOverlay   = document.getElementById("player-overlay");
        var playerChannelNm = document.getElementById("player-channel-name");
        var mainVideo       = document.getElementById("main-video");
        var playerStatus    = document.getElementById("player-status");
        var btnClosePlayer  = document.getElementById("btn-close-player");

        // ===== MODAL: mostrar y configurar según tipo =====
        function showModal(url, name) {
            currentUrl  = url;
            currentName = name;
            var type    = detectUrlType(url);

            modalTitle.textContent    = name;
            modalSubtitle.textContent = type === "hls"  ? "Stream HLS (m3u8)" :
                                        type === "dash" ? "Stream DASH (mpd)" :
                                        type === "m3u"  ? "Lista M3U"         :
                                        "Sitio web externo";

            // Mostrar/ocultar opción inline según tipo
            btnInline.style.display    = (type === "hls" || type === "dash") ? "flex" : "none";
            // Para web simple, mostrar solo browser; para streams, las tres opciones
            btnMxPlayer.style.display  = (type === "hls" || type === "dash") ? "flex" : "none";
            btnVlc.style.display       = (type === "hls" || type === "dash") ? "flex" : "none";
            btnBrowser.style.display   = "flex";

            modalOverlay.classList.add("visible");
        }

        function hideModal() {
            modalOverlay.classList.remove("visible");
        }

        // ===== REPRODUCTOR INLINE =====
        function destroyPlayers() {
            if (hlsInstance)  { hlsInstance.destroy();  hlsInstance  = null; }
            if (dashInstance) { dashInstance.reset();   dashInstance = null; }
            mainVideo.src = "";
            mainVideo.load();
        }

        function showStatus(msg) {
            playerStatus.textContent = msg;
            playerStatus.style.display = "block";
            clearTimeout(showStatus._t);
            showStatus._t = setTimeout(function() { playerStatus.style.display = "none"; }, 3000);
        }

        function openInline(url, name) {
            destroyPlayers();
            playerChannelNm.textContent = name;
            playerOverlay.classList.add("visible");

            var type = detectUrlType(url);

            if (type === "hls") {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({ enableWorker: false, lowLatencyMode: true });
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(mainVideo);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                        mainVideo.play();
                        showStatus("▶ Reproduciendo HLS");
                    });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) showStatus("⚠ Error de stream");
                    });
                } else if (mainVideo.canPlayType('application/vnd.apple.mpegurl')) {
                    mainVideo.src = url;
                    mainVideo.play();
                } else {
                    showStatus("⚠ HLS no soportado en este browser");
                }
            } else if (type === "dash") {
                if (typeof dashjs !== "undefined") {
                    dashInstance = dashjs.MediaPlayer().create();
                    dashInstance.initialize(mainVideo, url, true);
                    showStatus("▶ Reproduciendo DASH");
                } else {
                    showStatus("⚠ DASH no disponible");
                }
            } else {
                mainVideo.src = url;
                mainVideo.play();
            }
        }

        function closePlayer() {
            destroyPlayers();
            playerOverlay.classList.remove("visible");
        }

        // ===== EVENTOS DEL MODAL =====
        btnInline.onclick = function() {
            hideModal();
            openInline(currentUrl, currentName);
        };

        btnMxPlayer.onclick = function() {
            hideModal();
            try {
                window.location.href = buildMxIntent(currentUrl, currentName);
            } catch(e) {
                showStatus("MX Player no encontrado");
            }
        };

        btnVlc.onclick = function() {
            hideModal();
            try {
                window.location.href = buildVlcIntent(currentUrl);
            } catch(e) {
                showStatus("VLC no encontrado");
            }
        };

        btnBrowser.onclick = function() {
            hideModal();
            // Misma tab — sin acumular pestañas
            window.location.href = currentUrl;
        };

        btnCancelModal.onclick = hideModal;

        // Cerrar modal tocando fuera
        modalOverlay.onclick = function(e) {
            if (e.target === modalOverlay) hideModal();
        };

        btnClosePlayer.onclick = closePlayer;

        // ===== FUNCIÓN PARA MANEJAR CLICK EN CARD =====
        function handleCardClick(url, name, isTrigger) {
            if (isTrigger) { showFootball(); return; }
            if (!url) return;
            var type = detectUrlType(url);
            if (type === "hls" || type === "dash") {
                // Stream directo: mostrar modal con todas las opciones
                showModal(url, name);
            } else {
                // Sitio web externo: ir directamente en la misma tab
                window.location.href = url;
            }
        }

        // ===== RENDER PRINCIPAL =====
        function renderMain() {
            var html = [];
            for (var i = 0; i < channels.length; i++) {
                var ch = channels[i];
                html.push('<div class="card locked" tabindex="0" data-url="' + (ch.url || '') + '" data-trigger="' + (ch.isTrigger ? "1" : "0") + '" data-name="' + ch.name + '">');
                html.push('<i class="' + (ch.icon || "fas fa-tv") + '"></i>');
                html.push('<span>' + ch.name + '</span>');
                html.push('</div>');
            }
            gridEl.innerHTML = html.join('');
            attachCardEvents(gridEl.children);
        }

        // ===== RENDER FÚTBOL =====
        function renderFootball() {
            var html = [];
            for (var i = 0; i < footballOptions.length; i++) {
                var opt = footballOptions[i];
                html.push('<div class="card locked" tabindex="0" data-url="' + opt.url + '" data-trigger="0" data-name="' + opt.name + '">');
                html.push('<i class="' + opt.icon + '"></i>');
                html.push('<span>' + opt.name + '</span>');
                html.push('</div>');
            }
            gridEl.innerHTML = html.join('');
            attachCardEvents(gridEl.children);
        }

        function attachCardEvents(cards) {
            for (var i = 0; i < cards.length; i++) {
                (function(card) {
                    var url     = card.getAttribute('data-url');
                    var name    = card.getAttribute('data-name');
                    var trigger = card.getAttribute('data-trigger') === "1";
                    card.onclick = function() { handleCardClick(url, name, trigger); };
                    card.onkeypress = function(e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            handleCardClick(url, name, trigger);
                        }
                    };
                })(cards[i]);
            }
        }

        // ===== SUBMENÚ FÚTBOL =====
        function showFootball() {
            if (currentMode === "football") return;
            currentMode = "football";
            headerDiv.innerHTML = '<h1><i class="fas fa-futbol"></i> MENU FUTBOL - OPCIONES <i class="fas fa-tv"></i></h1>';
            backContainer.innerHTML = '<button class="back-button" id="btn-back-main"><i class="fas fa-arrow-left"></i> Volver al menú principal</button>';
            document.getElementById("btn-back-main").onclick = goToMain;
            renderFootball();
        }

        function goToMain() {
            if (currentMode === "main") return;
            currentMode = "main";
            headerDiv.innerHTML = '<h1><i class="fas fa-tv"></i> MENU STPC TV <i class="fas fa-satellite-dish"></i></h1>';
            backContainer.innerHTML = '';
            renderMain();
        }

        // ===== INIT =====
        renderMain();

        if (window.console) console.log("MENU STPC TV v2 — Sin tabs acumuladas | HLS.js + DASH | MX Player intent");
    </script>
</body>
</html>
